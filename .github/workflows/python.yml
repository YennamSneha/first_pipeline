name: Python Demo Pipeline

on:
  push:
    branches:
      - main

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Checkout Repository
        uses: actions/checkout@v4

      - name: Step 2 - Show Repository Files
        run: ls -la

      - name: Step 3 - Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Step 4 - Show Python Version
        run: python --version

      - name: Step 5 - Install Dependencies
        run: pip install -r requirements.txt

      - name: Step 6 - Run Python Program
        run: python app.py

      - name: Step 7 - Display Current Date
        run: date

      - name: Step 8 - Success Message
        run: echo "Pipeline completed successfully!"